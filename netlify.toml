# Netlify Configuration for Linktree Portfolio
# Author: Douglas Assumpcao Rodrigues
# Version: 1.0.0

[build]
  publish = "."
  command = "npm run build"
  functions = "api"

[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

[context.production.environment]
  SUPABASE_URL = "https://your-project.supabase.co"
  SUPABASE_ANON_KEY = "your-anon-key"
  RESEND_API_KEY = "your-resend-key"
  CONTACT_EMAIL = "contato@douglasrodrigues.dev"
  ALLOWED_ORIGINS = "https://douglas-rodrigues.netlify.app,https://douglas-rodrigues.vercel.app,http://localhost:3000"

[context.deploy-preview.environment]
  NODE_ENV = "development"
  SUPABASE_URL = "https://your-project.supabase.co"
  SUPABASE_ANON_KEY = "your-anon-key"
  ALLOWED_ORIGINS = "http://localhost:3000,https://*.netlify.app"

[context.branch-deploy.environment]
  NODE_ENV = "development"
  ALLOWED_ORIGINS = "http://localhost:3000,https://*.netlify.app"

# Functions configuration
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

# Redirects
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/portfolio"
  to = "/portfolio-mainframe.html"
  status = 200

[[redirects]]
  from = "/mainframe"
  to = "/portfolio-mainframe.html"
  status = 200

# External redirects
[[redirects]]
  from = "/github"
  to = "https://github.com/douglas-rodrigues"
  status = 302

[[redirects]]
  from = "/linkedin"
  to = "https://linkedin.com/in/douglas-rodrigues"
  status = 302

[[redirects]]
  from = "/whatsapp"
  to = "https://wa.me/5511999999999"
  status = 302

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-DNS-Prefetch-Control = "on"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://douglas-rodrigues.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With"
    Access-Control-Allow-Credentials = "true"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Security headers for specific paths
[[headers]]
  for = "/"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.emailjs.com; frame-ancestors 'none';"

# Environment variables for Netlify UI
[build.environment]
  # These will be set in Netlify UI > Site settings > Environment variables
  # SUPABASE_URL = ""
  # SUPABASE_ANON_KEY = ""
  # RESEND_API_KEY = ""
  # SENDGRID_API_KEY = ""
  # CONTACT_EMAIL = ""
  # ALLOWED_ORIGINS = ""

# Edge functions (if using Netlify Edge)
# [[edge_functions]]
#   path = "/api/analytics"
#   function = "analytics"

# Plugin configuration
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Deploy settings
[dev]
  port = 3000
  publish = "."
  targetPort = 3000
  framework = "#static"

# Analytics (optional)
[analytics]
  enabled = true

# Form handling (for contact form)
[[forms]]
  name = "contact"
  action = "/api/contact"
  method = "POST"
  [forms.fields]
    name = { required = true }
    email = { required = true, type = "email" }
    message = { required = true }
    phone = { required = false }
    company = { required = false }
    subject = { required = false }

# Build hooks (for CI/CD)
[build_hooks]
  # Example: Trigger build when pushing to main
  # branch = "main"
  # url = "https://api.netlify.com/build_hooks/..."

# Git LFS (if using large files)
[lfs]
  enabled = false

# Image optimization
[images]
  remote_images = ["https://douglas-rodrigues.vercel.app/assets/*"]
  compress = true
  quality = 80

# Serverless functions timeout
[functions."api/analytics.js"]
  timeout = 10

[functions."api/contact.js"]
  timeout = 15

[functions."api/health.js"]
  timeout = 10

[functions."api/visits.js"]
  timeout = 10